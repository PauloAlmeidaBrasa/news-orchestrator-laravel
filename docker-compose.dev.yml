version: '3.8'

include:
  - docker-compose.base.yml

services:
  app:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=sync
    ports:
      - "8000:8000"
    volumes:
      - ./backend-laravel:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    ports:
      - "3306:3306"